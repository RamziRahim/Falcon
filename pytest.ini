[pytest]
pythonpath = .

markers =
    integration: hits real external APIs (e.g. Yahoo Finance). Skipped by default.
    slow: long-running or manual/periodic checks not meant for every commit.

# Skip integration and slow tests by default; run explicitly with:
#   pytest -m integration
#   pytest -m slow
#   pytest -m "not integration and not slow"   (default fast suite)
addopts = -m "not integration and not slow"

testpaths = tests
